
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ERA · voice assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #0b1729 0%, #1b2f44 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 12px;
      margin: 0;
      touch-action: pan-y; /* preserve vertical scroll, but we'll keep it minimal */
    }

    /* card / glass container */
    .assistant-card {
      width: 100%;
      max-width: 400px;
      background: rgba(22, 38, 53, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(157, 195, 230, 0.15) inset;
      overflow: hidden;
      padding: 24px 20px 32px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    /* era header */
    .era-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 0 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo-icon {
      background: #3d6eff;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: white;
      box-shadow: 0 8px 16px -6px #1e3f8f;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #f0f5fa, #c7d9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .battery-indicator {
      background: rgba(12, 25, 40, 0.7);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 13px;
      color: #a3c6ff;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .battery-indicator::after {
      content: "•••";
      letter-spacing: 2px;
      color: #6d9eff;
      font-size: 10px;
    }

    /* waveform / era sphere */
    .voice-sphere {
      background: #1f3147;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      margin: 16px auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 -5px 30px rgba(70, 140, 255, 0.3),
        0 20px 35px -10px #00000080,
        inset 0 -3px 8px #4b7fff33,
        inset 0 3px 10px #b0d0ff;
      transition: box-shadow 0.3s, transform 0.2s;
      position: relative;
    }

    .voice-sphere::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90, 165, 255, 0.2) 0%, transparent 70%);
      opacity: 0.5;
      animation: pulse-glow 3s infinite alternate;
    }

    @keyframes pulse-glow {
      0% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(1.25); opacity: 0.7; }
    }

    .sphere-inner {
      background: #142433;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #345680;
      box-shadow: inset 0 8px 18px #00000080;
      z-index: 2;
    }

    .era-status {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #9eb9e3;
      margin-bottom: 4px;
    }

    .era-wave {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 28px;
    }

    .era-wave span {
      width: 4px;
      height: 16px;
      background: #4794ff;
      border-radius: 10px;
      animation: wave 0.9s infinite ease-in-out;
      opacity: 0.8;
    }

    .era-wave span:nth-child(1) { animation-delay: 0.0s; height: 12px; }
    .era-wave span:nth-child(2) { animation-delay: 0.2s; height: 22px; background: #6aa9ff; }
    .era-wave span:nth-child(3) { animation-delay: 0.4s; height: 28px; background: #86bbff; }
    .era-wave span:nth-child(4) { animation-delay: 0.3s; height: 22px; background: #6aa9ff; }
    .era-wave span:nth-child(5) { animation-delay: 0.1s; height: 12px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.8); opacity: 0.5; }
      50% { transform: scaleY(1.4); opacity: 1; }
    }

    /* listening status */
    .listening-indicator {
      text-align: center;
      font-size: 15px;
      font-weight: 400;
      color: #ccdefa;
      background: rgba(0, 20, 50, 0.5);
      padding: 8px 20px;
      border-radius: 60px;
      margin: 12px 25px 20px;
      backdrop-filter: blur(10px);
      border: 0.5px solid #3c608b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .mic-symbol {
      font-size: 18px;
      filter: drop-shadow(0 0 6px #5f9eff);
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4fff8b;
      box-shadow: 0 0 12px #00ee7c;
      display: inline-block;
    }

    /* conversation log */
    .conversation-area {
      background: rgba(10, 20, 31, 0.7);
      border-radius: 32px;
      padding: 18px 14px;
      margin: 16px 0 24px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #34679e #091e30;
      font-size: 14px;
      line-height: 1.5;
      color: #d1e2fe;
    }

    .conversation-area::-webkit-scrollbar {
      width: 5px;
    }
    .conversation-area::-webkit-scrollbar-track {
      background: #091e30;
      border-radius: 10px;
    }
    .conversation-area::-webkit-scrollbar-thumb {
      background: #34679e;
      border-radius: 10px;
    }

    .message {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }

    .message.user {
      align-items: flex-end;
    }

    .message.era {
      align-items: flex-start;
    }

    .bubble {
      max-width: 90%;
      padding: 10px 16px;
      border-radius: 24px;
      background: #1f344b;
      border: 0.5px solid #385e8b;
      box-shadow: 0 4px 12px #00000040;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #2a4a76;
      border-bottom-right-radius: 6px;
      color: white;
      text-align: right;
    }

    .message.era .bubble {
      background: #1d2c40;
      border-bottom-left-radius: 6px;
      color: #d5ebff;
    }

    .timestamp {
      font-size: 10px;
      opacity: 0.5;
      margin: 4px 8px 0;
    }

    /* control bar */
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      margin-top: 8px;
    }

    .action-btn {
      background: #263e59;
      border: none;
      width: 64px;
      height: 64px;
      border-radius: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 12px;
      color: #b7d6ff;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px #0000004d, 0 4px 0 #0f1e2e inset, 0 -2px 8px #21509b inset;
      transition: all 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      touch-action: manipulation;
      font-weight: 500;
      border: 1px solid #41658a;
    }

    .action-btn:active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px #0000004d, 0 1px 0 #0f1e2e inset;
    }

    .action-btn.main-mic {
      width: 80px;
      height: 80px;
      background: #3868b0;
      border: 2px solid #9ac4ff;
      box-shadow: 0 0 25px #3f8cff;
    }

    .action-btn.main-mic:active {
      background: #1f4b8a;
    }

    .btn-icon {
      font-size: 24px;
      line-height: 1;
    }

    /* fallback note */
    .fallback-note {
      text-align: center;
      font-size: 11px;
      color: #5880aa;
      margin-top: 16px;
      border-top: 0.5px dashed #31607e;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="assistant-card">
    <!-- era header -->
    <div class="era-header">
      <div class="logo">
        <span class="logo-icon">E</span>
        <span class="logo-text">ERA</span>
      </div>
      <div class="battery-indicator">
        <span>online</span>
      </div>
    </div>

    <!-- central orb -->
    <div class="voice-sphere" id="voiceSphere">
      <div class="sphere-inner">
        <div class="era-status">ERA</div>
        <div class="era-wave" id="waveform">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div style="font-size:11px; color:#6e9ad6; margin-top:6px;">voice</div>
      </div>
    </div>

    <!-- live indicator -->
    <div class="listening-indicator" id="listeningIndicator">
      <span class="pulse-dot" id="statusLed"></span>
      <span id="statusMessage">tap mic and speak</span>
      <span class="mic-symbol">🎙️</span>
    </div>

    <!-- conversation transcript -->
    <div class="conversation-area" id="conversationLog">
      <div class="message era">
        <div class="bubble">Hello, I'm ERA. How can I assist you?</div>
        <div class="timestamp">now</div>
      </div>
    </div>

    <!-- bottom controls (mobile friendly) -->
    <div class="control-row">
      <button class="action-btn" id="resetBtn" aria-label="reset">
        <span class="btn-icon">↺</span>
        <span>reset</span>
      </button>
      
      <button class="action-btn main-mic" id="micButton" aria-label="microphone">
        <span class="btn-icon">🎤</span>
        <span>listen</span>
      </button>
      
      <button class="action-btn" id="speakBtn" aria-label="speak last">
        <span class="btn-icon">🔊</span>
        <span>speak</span>
      </button>
    </div>

    <!-- tiny explanation (supports mobile safari) -->
    <div class="fallback-note">
      ⚡ tap «listen» & allow mic · ERA replies with voice (mobile friendly)
    </div>
  </div>

  <script>
    (function(){
      // ------- era voice assistant logic -------
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const synthesis = window.speechSynthesis;

      // DOM elements
      const micBtn = document.getElementById('micButton');
      const resetBtn = document.getElementById('resetBtn');
      const speakBtn = document.getElementById('speakBtn');
      const conversationLog = document.getElementById('conversationLog');
      const statusMessage = document.getElementById('statusMessage');
      const statusLed = document.getElementById('statusLed');
      const waveform = document.getElementById('waveform');
      const sphere = document.getElementById('voiceSphere');

      // state
      let recognition = null;
      let isListening = false;
      let pendingTranscript = '';
      let lastEraResponse = 'I am ERA, your voice assistant.';
      let conversationHistory = []; // optional, but we use DOM directly

      // initial greeting (already in html, but we can push to history)
      addMessage('era', 'Hello, I\'m ERA. How can I assist you?');

      // --- helper: add message to log ---
      function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', role);

        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.innerText = text;

        const time = document.createElement('div');
        time.classList.add('timestamp');
        const d = new Date();
        time.innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        messageDiv.appendChild(bubble);
        messageDiv.appendChild(time);
        conversationLog.appendChild(messageDiv);
        conversationLog.scrollTop = conversationLog.scrollHeight; // auto-scroll

        if (role === 'era') {
          lastEraResponse = text;
        }
      }

      // --- update listening UI ---
      function setListeningState(active) {
        isListening = active;
        if (active) {
          statusMessage.innerText = 'listening...';
          statusLed.style.background = '#ff4f4f';
          statusLed.style.boxShadow = '0 0 12px #ff4f4f';
          if (waveform) waveform.style.opacity = '1';
          sphere.style.boxShadow = '0 -5px 40px rgba(255, 100, 100, 0.5), 0 20px 35px -10px #000, inset 0 -3px 8px #ff9066';
        } else {
          statusMessage.innerText = 'tap mic and speak';
          statusLed.style.background = '#4fff8b';
          statusLed.style.boxShadow = '0 0 12px #00ee7c';
          sphere.style.boxShadow = '0 -5px 30px rgba(70, 140, 255, 0.3), 0 20px 35px -10px #00000080, inset 0 -3px 8px #4b7fff33';
        }
      }

      // --- speak using synthesis (with mobile-friendly approach) ---
      function speakText(text) {
        if (!synthesis) {
          addMessage('era', '(Text-to-speech not supported)');
          return;
        }
        // cancel ongoing to avoid overlapping
        synthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        utterance.volume = 1;
        utterance.voice = synthesis.getVoices().find(v => v.lang.includes('en')) || null;

        // visual feedback
        utterance.onstart = () => {
          statusMessage.innerText = 'ERA speaking...';
          statusLed.style.background = '#ffdd66';
        };
        utterance.onend = () => {
          statusMessage.innerText = 'tap mic and speak';
          statusLed.style.background = '#4fff8b';
        };
        utterance.onerror = () => {
          statusMessage.innerText = 'tap mic and speak';
        };

        synthesis.speak(utterance);
      }

      // --- process command (mock era AI, but with some responses) ---
      function processEraResponse(userText) {
        const lower = userText.toLowerCase();
        let reply = '';

        if (lower.includes('hello') || lower.includes('hi era')) {
          reply = 'Hello there! How can I help?';
        } else if (lower.includes('how are you')) {
          reply = 'I am functioning perfectly, thank you for asking.';
        } else if (lower.includes('time')) {
          const now = new Date();
          reply = `It's ${now.toLocaleTimeString()} on this fine day.`;
        } else if (lower.includes('weather')) {
          reply = 'The weather is always pleasant in the ERA cloud.';
        } else if (lower.includes('name')) {
          reply = 'I am ERA, your voice assistant.';
        } else if (lower.includes('bye') || lower.includes('goodbye')) {
          reply = 'Goodbye! Reach out anytime.';
        } else if (lower.includes('thank')) {
          reply = 'You\'re welcome!';
        } else if (lower.includes('who created you')) {
          reply = 'I was built for the ERA web app, designed for mobile.';
        } else {
          reply = `You said: "${userText}". I'm learning every day.`;
        }

        return reply;
      }

      // --- start recognition (mobile: must be triggered by user tap) ---
      function startRecognition() {
        if (!SpeechRecognition) {
          addMessage('era', 'Speech recognition not supported in this browser. Try Chrome or Safari.');
          return;
        }

        if (isListening) {
          try { recognition?.stop(); } catch(e) {}
          setListeningState(false);
          return;
        }

        try {
          recognition = new SpeechRecognition();
          recognition.continuous = false; // mobile friendly: single utterance
          recognition.interimResults = false; // we want final only for simplicity
          recognition.lang = 'en-US';
          recognition.maxAlternatives = 1;

          recognition.onstart = () => {
            setListeningState(true);
          };

          recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.trim();
            if (transcript) {
              addMessage('user', transcript);
              pendingTranscript = transcript;

              // get response from ERA logic
              const response = processEraResponse(transcript);
              addMessage('era', response);
              lastEraResponse = response;

              // automatically speak the response? we can but we let speak button also; here we optionally speak
              // but for better mobile experience, we speak automatically after short delay
              setTimeout(() => {
                speakText(response);
              }, 200);
            }
          };

          recognition.onerror = (e) => {
            console.warn('recognition error', e.error);
            let errorMsg = 'mic error. ';
            if (e.error === 'not-allowed') errorMsg = 'Microphone access denied. Please enable permissions.';
            else if (e.error === 'no-speech') errorMsg = 'No speech detected.';
            addMessage('era', errorMsg);
            setListeningState(false);
          };

          recognition.onend = () => {
            setListeningState(false);
          };

          recognition.start();
        } catch (error) {
          addMessage('era', 'Could not start microphone. Check permissions.');
          setListeningState(false);
        }
      }

      // --- reset conversation (clear log and restart) ---
      function resetConversation() {
        // clear the log (keep first greeting maybe)
        while (conversationLog.firstChild) {
          conversationLog.removeChild(conversationLog.firstChild);
        }
        addMessage('era', 'Hello, I\'m ERA. How can I assist you?');
        if (synthesis) synthesis.cancel();
        setListeningState(false);
        if (recognition) {
          try { recognition.abort(); } catch (e) {}
        }
        pendingTranscript = '';
      }

      // --- speak the last ERA response ---
      function speakLastResponse() {
        if (lastEraResponse) {
          speakText(lastEraResponse);
        } else {
          speakText('ERA is ready');
        }
      }

      // --- event listeners (mobile friendly: no double-fire) ---
      micBtn.addEventListener('click', (e) => {
        e.preventDefault();
        startRecognition();
      });

      resetBtn.addEventListener('click', (e) => {
        e.preventDefault();
        resetConversation();
      });

      speakBtn.addEventListener('click', (e) => {
        e.preventDefault();
        speakLastResponse();
      });

      // optional: if user double taps, prevent accidental page zoom (already ok)
      // warm up voices (for safari)
      if (synthesis) {
        synthesis.getVoices(); // preload
        // also some mobile browsers need a user interaction before any speech – but speak is triggered by button.
      }

      // check for recognition support and show fallback if none
      if (!SpeechRecognition) {
        addMessage('era', 'Your browser does not support voice recognition. Try Chrome/Safari.');
        statusMessage.innerText = 'recognition unavailable';
      }

      // ensure that we handle page visibility / stop listening
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && recognition) {
          try { recognition.abort();
